events {}

http {
  server {
    listen 80;

    # FE
    location / {
      proxy_pass http://host.docker.internal:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # BE
    location /api/ {
      proxy_pass http://host.docker.internal:3001/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}